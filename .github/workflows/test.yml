name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Run unit tests (SDK + web)
        run: npm test

      - name: Install SDK dependencies
        run: cd sdk/typescript && npm ci

      - name: Run SDK tests (isolated)
        run: cd sdk/typescript && npm test
