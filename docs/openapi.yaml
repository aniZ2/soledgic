          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/upload-receipt:
    post:
      operationId: "upload-receipt"
      summary: "Upload Receipt"
      tags:
        - "Accounting"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadReceiptRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadReceiptResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/webhooks:
    post:
      operationId: "webhooks"
      summary: "Webhooks Management"
      tags:
        - "Webhooks"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                action:
                  type: "string"
                  enum:
                    - "list"
                    - "create"
                    - "update"
                    - "delete"
                    - "test"
                    - "deliveries"
                    - "retry"
                endpoint_id:
                  type: "string"
                  format: "uuid"
                delivery_id:
                  type: "string"
                  format: "uuid"
                url:
                  type: "string"
                  format: "uri"
                description:
                  type: "string"
                events:
                  type: "array"
                  items:
                    type: "string"
                is_active:
                  type: "boolean"
              required:
                - "action"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    ApiKeyAuth:
      type: "apiKey"
      in: "header"
      name: "x-api-key"
      description: "Your Soledgic API key"
  schemas:
    SuccessEnvelope:
      type: "object"
      properties:
        success:
          type: "boolean"
          const: true
        request_id:
          type: "string"
          description: "Unique request identifier"
          examples:
            - "req_abc123"
      required:
        - "success"
        - "request_id"
    ErrorEnvelope:
      type: "object"
      properties:
        success:
          type: "boolean"
          const: false
        error:
          type: "string"
        error_code:
          type: "string"
        request_id:
          type: "string"
      required:
        - "success"
        - "error"
        - "request_id"
    RateLimitError:
      type: "object"
      properties:
        success:
          type: "boolean"
          const: false
        error:
          type: "string"
        request_id:
          type: "string"
        retry_after:
          type: "integer"
          description: "Seconds until rate limit resets"
          examples:
            - 60
      required:
        - "success"
        - "error"
        - "request_id"
        - "retry_after"
    RecordSaleRequest:
      type: "object"
      properties:
        reference_id:
          type: "string"
          description: "Your external sale ID (order ID, payment ID, etc.)"
        creator_id:
          type: "string"
          description: "The creator receiving funds"
        amount:
          type: "integer"
          description: "Sale amount in cents"
        currency:
          type: "string"
          description: "Currency code (default: USD)"
          default: "USD"
        description:
          type: "string"
          description: "Sale description"
        reference_type:
          type: "string"
          description: "Reference type (e.g., 'processor_payment', 'manual')"
        processing_fee:
          type: "integer"
          description: "Processing fee in cents"
        processing_fee_paid_by:
          type: "string"
          enum:
            - "platform"
            - "creator"
            - "split"
        product_id:
          type: "string"
        product_name:
          type: "string"
        creator_percent:
          type: "number"
          description: "Override revenue split percentage (0-100)"
        skip_withholding:
          type: "boolean"
          description: "Skip tax withholding for this sale"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "reference_id"
        - "creator_id"
        - "amount"
    CreateCheckoutRequest:
      type: "object"
      properties:
        amount:
          type: "integer"
          description: "Amount in cents"
        creator_id:
          type: "string"
          description: "Creator receiving funds"
        currency:
          type: "string"
          default: "USD"
        product_id:
          type: "string"
        product_name:
          type: "string"
        customer_email:
          type: "string"
          format: "email"
        customer_id:
          type: "string"
        payment_method_id:
          type: "string"
          description: "Payment instrument ID for direct charge. When omitted, creates a hosted checkout session."
        source_id:
          type: "string"
          description: "Backward-compat alias for payment_method_id"
        idempotency_key:
          type: "string"
          description: "Required for direct charges, optional for session mode"
        success_url:
          type: "string"
          format: "uri"
          description: "Redirect URL after successful payment (required for session mode)"
        cancel_url:
          type: "string"
          format: "uri"
          description: "Redirect URL if buyer cancels (session mode)"
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
      required:
        - "amount"
        - "creator_id"
    ProcessPayoutRequest:
      type: "object"
      properties:
        reference_id:
          type: "string"
          description: "Unique reference ID for this payout"
        creator_id:
          type: "string"
          description: "Creator to pay"
        amount:
          type: "integer"
          description: "Amount in cents"
        reference_type:
          type: "string"
        description:
          type: "string"
        payout_method:
          type: "string"
        fees:
          type: "integer"
          description: "Fees in cents"
        fees_paid_by:
          type: "string"
          enum:
            - "platform"
            - "creator"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "reference_id"
        - "creator_id"
        - "amount"
    RecordRefundRequest:
      type: "object"
      properties:
        original_sale_reference:
          type: "string"
          description: "Reference ID of the original sale"
        reason:
          type: "string"
          description: "Refund reason (required for audit)"
        amount:
          type: "integer"
          description: "Amount in cents (defaults to full sale amount)"
        refund_from:
          type: "string"
          enum:
            - "both"
            - "platform_only"
            - "creator_only"
        external_refund_id:
          type: "string"
        idempotency_key:
          type: "string"
        mode:
          type: "string"
          enum:
            - "ledger_only"
            - "processor_refund"
          default: "ledger_only"
        processor_payment_id:
          type: "string"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "original_sale_reference"
        - "reason"
    ReverseTransactionRequest:
      type: "object"
      properties:
        transaction_id:
          type: "string"
          format: "uuid"
          description: "Transaction UUID to reverse"
        reason:
          type: "string"
          description: "Reason for reversal (required for audit)"
        partial_amount:
          type: "integer"
          description: "Partial reversal amount in cents"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "transaction_id"
        - "reason"
    CreateCreatorRequest:
      type: "object"
      properties:
        creator_id:
          type: "string"
          description: "Unique creator identifier"
        display_name:
          type: "string"
        email:
          type: "string"
          format: "email"
        default_split_percent:
          type: "number"
          minimum: 0
          maximum: 100
        tax_info:
          type: "object"
          properties:
            tax_id_type:
              type: "string"
              enum:
                - "ssn"
                - "ein"
                - "itin"
            tax_id_last4:
              type: "string"
            legal_name:
              type: "string"
            business_type:
              type: "string"
              enum:
                - "individual"
                - "sole_proprietor"
                - "llc"
                - "corporation"
                - "partnership"
            address:
              type: "object"
              properties:
                line1:
                  type: "string"
                line2:
                  type: "string"
                city:
                  type: "string"
                state:
                  type: "string"
                postal_code:
                  type: "string"
                country:
                  type: "string"
        payout_preferences:
          type: "object"
          properties:
            schedule:
              type: "string"
              enum:
                - "manual"
                - "weekly"
                - "biweekly"
                - "monthly"
            minimum_amount:
              type: "integer"
            method:
              type: "string"
              enum:
                - "card"
                - "manual"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "creator_id"
    RecordAdjustmentRequest:
      type: "object"
      properties:
        adjustment_type:
          type: "string"
          enum:
            - "correction"
            - "reclassification"
            - "accrual"
            - "deferral"
            - "depreciation"
            - "write_off"
            - "year_end"
            - "opening_balance"
            - "other"
        entries:
          type: "array"
          minItems: 2
          description: "Journal entries (must balance)"
          items:
            type: "object"
            properties:
              account_type:
                type: "string"
              entity_id:
                type: "string"
              entry_type:
                type: "string"
                enum:
                  - "debit"
                  - "credit"
              amount:
                type: "integer"
            required:
              - "account_type"
              - "entry_type"
              - "amount"
        reason:
          type: "string"
          description: "Reason for adjustment (required for audit)"
        adjustment_date:
          type: "string"
          format: "date"
          description: "YYYY-MM-DD"
        original_transaction_id:
          type: "string"
          format: "uuid"
        supporting_documentation:
          type: "string"
        prepared_by:
          type: "string"
      required:
        - "adjustment_type"
        - "entries"
        - "reason"
        - "prepared_by"
    RecordOpeningBalanceRequest:
      type: "object"
      properties:
        as_of_date:
          type: "string"
          format: "date"
          description: "YYYY-MM-DD"
        source:
          type: "string"
          enum:
            - "manual"
            - "imported"
            - "migrated"
            - "year_start"
        source_description:
          type: "string"
        balances:
          type: "array"
          items:
            type: "object"
            properties:
              account_type:
                type: "string"
              entity_id:
                type: "string"
              balance:
                type: "integer"
            required:
              - "account_type"
              - "balance"
      required:
        - "as_of_date"
        - "source"
        - "balances"
    RecordTransferRequest:
      type: "object"
      properties:
        from_account_type:
          type: "string"
        to_account_type:
          type: "string"
        amount:
          type: "integer"
          description: "Amount in cents"
        transfer_type:
          type: "string"
          enum:
            - "tax_reserve"
            - "payout_reserve"
            - "owner_draw"
            - "owner_contribution"
            - "operating"
            - "savings"
            - "investment"
            - "other"
        description:
          type: "string"
        reference_id:
          type: "string"
      required:
        - "from_account_type"
        - "to_account_type"
        - "amount"
        - "transfer_type"
    RiskEvaluationRequest:
      type: "object"
      properties:
        idempotency_key:
          type: "string"
        amount:
          type: "integer"
          description: "Amount in cents"
        currency:
          type: "string"
          default: "USD"
        counterparty_name:
          type: "string"
        authorizing_instrument_id:
          type: "string"
          format: "uuid"
        expected_date:
          type: "string"
          format: "date"
        category:
          type: "string"
      required:
        - "idempotency_key"
        - "amount"
    ExportReportRequest:
      type: "object"
      properties:
        report_type:
          type: "string"
          enum:
            - "transaction_detail"
            - "creator_earnings"
            - "platform_revenue"
            - "payout_summary"
            - "reconciliation"
            - "audit_log"
        format:
          type: "string"
          enum:
            - "csv"
            - "json"
        start_date:
          type: "string"
          format: "date"
        end_date:
          type: "string"
          format: "date"
        creator_id:
          type: "string"
      required:
        - "report_type"
        - "format"
    UploadReceiptRequest:
      type: "object"
      properties:
        file_url:
          type: "string"
          format: "uri"
          description: "File URL (must be Supabase storage)"
        file_name:
          type: "string"
        file_size:
          type: "integer"
          description: "File size in bytes (max 50MB)"
        mime_type:
          type: "string"
          enum:
            - "image/jpeg"
            - "image/png"
            - "image/gif"
            - "image/webp"
            - "application/pdf"
        merchant_name:
          type: "string"
        transaction_date:
          type: "string"
          format: "date"
        total_amount:
          type: "integer"
          description: "Amount in cents"
        transaction_id:
          type: "string"
          format: "uuid"
      required:
        - "file_url"
    ReceivePaymentRequest:
      type: "object"
      properties:
        amount:
          type: "integer"
          description: "Amount in cents"
        invoice_transaction_id:
          type: "string"
          format: "uuid"
        customer_name:
          type: "string"
        customer_id:
          type: "string"
        reference_id:
          type: "string"
        payment_method:
          type: "string"
        payment_date:
          type: "string"
          format: "date"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "amount"
    ParticipantCreateRequest:
      type: "object"
      properties:
        participant_id:
          type: "string"
        display_name:
          type: "string"
        email:
          type: "string"
          format: "email"
        default_split_percent:
          type: "number"
          minimum: 0
          maximum: 100
        tax_info:
          type: "object"
          additionalProperties: true
        payout_preferences:
          type: "object"
          additionalProperties: true
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "participant_id"
    WalletMutationRequest:
      type: "object"
      properties:
        amount:
          type: "integer"
          description: "Amount in cents"
        reference_id:
          type: "string"
        description:
          type: "string"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "amount"
        - "reference_id"
    TransferFundsRequest:
      type: "object"
      properties:
        from_participant_id:
          type: "string"
        to_participant_id:
          type: "string"
        amount:
          type: "integer"
          description: "Amount in cents"
        reference_id:
          type: "string"
        description:
          type: "string"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "from_participant_id"
        - "to_participant_id"
        - "amount"
        - "reference_id"
    HoldReleaseRequest:
      type: "object"
      properties:
        execute_transfer:
          type: "boolean"
          default: true
    TreasuryCheckoutSessionRequest:
      type: "object"
      properties:
        participant_id:
          type: "string"
        amount:
          type: "integer"
          description: "Amount in cents"
        currency:
          type: "string"
          default: "USD"
        product_id:
          type: "string"
        product_name:
          type: "string"
        customer_email:
          type: "string"
          format: "email"
        customer_id:
          type: "string"
        payment_method_id:
          type: "string"
        source_id:
          type: "string"
        success_url:
          type: "string"
          format: "uri"
        cancel_url:
          type: "string"
          format: "uri"
        idempotency_key:
          type: "string"
        metadata:
          type: "object"
          additionalProperties:
            type: "string"
      required:
        - "participant_id"
        - "amount"
    TreasuryPayoutRequest:
      type: "object"
      properties:
        participant_id:
          type: "string"
        amount:
          type: "integer"
          description: "Amount in cents"
        reference_id:
          type: "string"
        reference_type:
          type: "string"
        description:
          type: "string"
        payout_method:
          type: "string"
        fees:
          type: "integer"
        fees_paid_by:
          type: "string"
          enum:
            - "platform"
            - "creator"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "participant_id"
        - "amount"
        - "reference_id"
    TreasuryRefundRequest:
      type: "object"
      properties:
        sale_reference:
          type: "string"
        reason:
          type: "string"
        amount:
          type: "integer"
          description: "Amount in cents"
        refund_from:
          type: "string"
          enum:
            - "both"
            - "platform_only"
            - "creator_only"
        external_refund_id:
          type: "string"
        idempotency_key:
          type: "string"
        mode:
          type: "string"
          enum:
            - "ledger_only"
            - "processor_refund"
        processor_payment_id:
          type: "string"
        metadata:
          type: "object"
          additionalProperties: true
      required:
        - "sale_reference"
        - "reason"
    RefundsListRequest:
      type: "object"
      properties:
        sale_reference:
          type: "string"
        limit:
          type: "integer"
          minimum: 1
          maximum: 100
    SaleBreakdown:
      type: "object"
      properties:
        total:
          type: "number"
          description: "Gross sale amount in major currency units"
        creator_amount:
          type: "number"
        platform_amount:
          type: "number"
        processing_fee:
          type: "number"
      required:
        - "total"
        - "creator_amount"
        - "platform_amount"
    RecordSaleResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: "object"
          properties:
            transaction_id:
              type: "string"
              format: "uuid"
            breakdown:
              $ref: "#/components/schemas/SaleBreakdown"
    CheckoutBreakdown:
      type: "object"
      properties:
        gross_amount:
          type: "number"
        creator_amount:
          type: "number"
        platform_amount:
          type: "number"
        creator_percent:
          type: "number"
    CreateCheckoutResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: "object"
          properties:
            provider:
              type: "string"
              enum:
                - "card"
            payment_id:
              type: "string"
            payment_intent_id:
              type: "string"
            client_secret:
              type:
                - "string"
                - "null"
            checkout_url:
              type:
                - "string"
                - "null"
            status:
              type:
                - "string"
                - "null"
            requires_action:
              type: "boolean"
            amount:
              type: "integer"
            currency:
              type: "string"
            breakdown:
              $ref: "#/components/schemas/CheckoutBreakdown"
            mode:
              type: "string"
              enum:
                - "direct"
                - "session"
            session_id:
              type: "string"
            expires_at:
              type: "string"
              format: "date-time"
    GetBalanceResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: "object"
          properties:
            balance:
              type: "object"
              properties:
                creator_id:
                  type: "string"
                available:
                  type: "number"
                pending:
                  type: "number"
                total_earned:
                  type: "number"
                total_paid_out:
                  type: "number"
                currency:
                  type: "string"
            balances:
              type: "array"
              items:
                type: "object"
                properties:
                  creator_id:
                    type: "string"
                  available:
                    type: "number"
                  pending:
                    type: "number"
                  currency:
                    type: "string"
            platform_summary:
              type: "object"
              properties:
                total_revenue:
                  type: "number"
                total_owed_creators:
                  type: "number"
                total_paid_out:
                  type: "number"
                cash_balance:
                  type: "number"
    ProcessPayoutResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: "object"
          properties:
            payout_id:
              type: "string"
            transaction_id:
              type: "string"
              format: "uuid"
            amount:
              type: "integer"
            status:
              type: "string"
    RecordRefundResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: "object"
          properties:
            transaction_id:
              type: "string"
              format: "uuid"
            refunded_amount:
              type: "integer"
            breakdown:
              type: "object"
              properties:
                from_creator:
                  type: "number"
                from_platform:
                  type: "number"
    ReverseTransactionResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: "object"
          properties:
            reversal_id:
              type: "string"
              format: "uuid"
            original_transaction_id:
              type: "string"
              format: "uuid"
            reversed_amount:
              type: "integer"
    TransactionEntry:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        account_id:
          type: "string"
          format: "uuid"
        entry_type:
          type: "string"
          enum:
            - "debit"
            - "credit"
        amount:
          type: "number"
        account:
          type: "object"
          properties:
            account_type:
              type: "string"
            entity_id:
              type:
                - "string"
                - "null"
            name:
              type: "string"
    Transaction:
      type: "object"
      properties:
        id:
          type: "string"
          format: "uuid"
        transaction_type:
          type: "string"
        reference_id:
          type:
            - "string"
            - "null"
        reference_type:
          type:
            - "string"
            - "null"
        description:
          type:
            - "string"
            - "null"
        amount:
          type: "number"
        currency:
          type: "string"
        status:
          type: "string"
        metadata:
          type: "object"
          additionalProperties: true
        created_at:
          type: "string"
