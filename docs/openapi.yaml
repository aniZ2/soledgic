openapi: "3.1.0"
info:
  title: "Soledgic API"
  version: "2026-03-01"
  description: "Financial infrastructure API for digital platforms. All amounts are in cents."
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "https://{project}.supabase.co/functions"
    variables:
      project:
        default: "your-project-ref"
        description: "Your Supabase project reference"
security:
  - ApiKeyAuth: []
tags:
  - name: "Accounting"
    description: "Journal adjustments, opening balances, transfers, bills, expenses, income, period close"
  - name: "Balances"
    description: "Query creator balances, platform summary, and cash runway"
  - name: "Banking"
    description: "Bank account management and statement import"
  - name: "Creators"
    description: "Create and manage creator accounts, splits, and contractor relationships"
  - name: "Invoicing"
    description: "Invoice management and PDF generation"
  - name: "Payments"
    description: "Checkout sessions, payouts, refunds, and payment-adjacent platform flows"
  - name: "Reports"
    description: "Financial reports — balance sheet, P&L, trial balance, aging, statements"
  - name: "Risk"
    description: "Risk evaluation, policy configuration, alerts, and preflight authorization"
  - name: "Tax"
    description: "Tax document generation and summaries"
  - name: "Transactions"
    description: "List and import transactions"
  - name: "Treasury"
    description: "Platform treasury resources for participants, wallets, holds, and internal transfers"
  - name: "Webhooks"
    description: "Webhook endpoint management"
paths:
  /v1/participants:
    get:
      operationId: "participants-get"
      summary: "List treasury participants or create a new participant-backed account."
      tags:
        - "Treasury"
      responses:
        "200":
          description: "Success"
          headers: &a1
            X-Request-Id:
              description: "Unique request identifier"
              schema:
                type: "string"
                examples:
                  - "req_abc123"
            Soledgic-Version:
              description: "API version used"
              schema:
                type: "string"
                examples:
                  - "2026-03-01"
            X-RateLimit-Remaining:
              description: "Remaining requests in current window"
              schema:
                type: "integer"
            X-RateLimit-Reset:
              description: "Unix timestamp when rate limit resets"
              schema:
                type: "integer"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: "participants-post"
      summary: "List treasury participants or create a new participant-backed account."
      tags:
        - "Treasury"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParticipantCreateRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/participants/{participant_id}:
    get:
      operationId: "participant-detail"
      summary: "Get a participant balance snapshot, including active holds."
      tags:
        - "Treasury"
      parameters:
        - name: "participant_id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/participants/{participant_id}/payout-eligibility:
    get:
      operationId: "participant-payout-eligibility"
      summary: "Check whether a participant is currently eligible for payout."
      tags:
        - "Treasury"
      parameters:
        - name: "participant_id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParticipantEligibilityResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/wallets/{participant_id}:
    get:
      operationId: "wallet-detail"
      summary: "Get the wallet balance for a participant."
      tags:
        - "Treasury"
      parameters:
        - name: "participant_id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/wallets/{participant_id}/entries:
    get:
      operationId: "wallet-entries"
      summary: "List wallet ledger entries for a participant."
      tags:
        - "Treasury"
      parameters:
        - name: "participant_id"
          in: "path"
          required: true
          schema:
            type: "string"
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: "number"
        - name: "offset"
          in: "query"
          required: false
          schema:
            type: "number"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletEntriesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/wallets/{participant_id}/deposits:
    post:
      operationId: "wallet-deposit"
      summary: "Deposit funds into a participant wallet."
      tags:
        - "Treasury"
      parameters:
        - name: "participant_id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletMutationRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletDepositResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/wallets/{participant_id}/withdrawals:
    post:
      operationId: "wallet-withdrawal"
      summary: "Withdraw funds from a participant wallet."
      tags:
        - "Treasury"
      parameters:
        - name: "participant_id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletMutationRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletWithdrawalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/transfers:
    post:
      operationId: "transfers"
      summary: "Move funds between participant wallets."
      tags:
        - "Treasury"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferFundsRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferFundsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/holds:
    get:
      operationId: "holds"
      summary: "List held funds across participants, with optional readiness filtering."
      tags:
        - "Treasury"
      parameters:
        - name: "participant_id"
          in: "query"
          required: false
          schema:
            type: "string"
        - name: "venture_id"
          in: "query"
          required: false
          schema:
            type: "string"
        - name: "ready_only"
          in: "query"
          required: false
          schema:
            type: "boolean"
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: "number"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HoldsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/holds/summary:
    get:
      operationId: "holds-summary"
      summary: "Get an aggregate summary of held and releasable funds."
      tags:
        - "Treasury"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HoldsSummaryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/holds/{hold_id}/release:
    post:
      operationId: "hold-release"
      summary: "Release a held-funds entry and optionally execute the transfer."
      tags:
        - "Treasury"
      parameters:
        - name: "hold_id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HoldReleaseRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HoldReleaseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/checkout-sessions:
    post:
      operationId: "checkout-sessions"
      summary: "Create a hosted or direct checkout session for a participant sale."
      tags:
        - "Payments"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreasuryCheckoutSessionRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/payouts:
    post:
      operationId: "payouts"
      summary: "Create a payout for a participant."
      tags:
        - "Payments"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreasuryPayoutRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayoutResourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/refunds:
    get:
      operationId: "refunds-get"
      summary: "List refunds or create a refund against a recorded sale."
      tags:
        - "Payments"
      parameters:
        - name: "sale_reference"
          in: "query"
          required: false
          schema:
            type: "string"
        - name: "limit"
          in: "query"
          required: false
          schema:
            type: "number"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundsListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: "refunds-post"
      summary: "List refunds or create a refund against a recorded sale."
      tags:
        - "Payments"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreasuryRefundRequest"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefundResourceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ap-aging:
    get:
      operationId: "ap-aging"
      summary: "Accounts Payable Aging Report"
      tags:
        - "Reports"
      parameters:
        - name: "as_of_date"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/ar-aging:
    get:
      operationId: "ar-aging"
      summary: "Accounts Receivable Aging Report"
      tags:
        - "Reports"
      parameters:
        - name: "as_of_date"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/balance-sheet:
    get:
      operationId: "balance-sheet"
      summary: "Balance Sheet Report"
      tags:
        - "Reports"
      parameters:
        - name: "as_of_date"
          in: "query"
          required: false
          schema:
            type: "string"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/close-period:
    post:
      operationId: "close-period"
      summary: "Close Accounting Period"
      tags:
        - "Accounting"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                year:
                  type: "number"
                month:
                  type: "number"
                quarter:
                  type: "number"
                notes:
                  type: "string"
              required:
                - "year"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/configure-alerts:
    post:
      operationId: "configure-alerts"
      summary: "Configure Alerts"
      tags:
        - "Risk"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                action:
                  type: "string"
                  enum:
                    - "list"
                    - "create"
                    - "update"
                    - "delete"
                    - "test"
                config_id:
                  type: "string"
                  format: "uuid"
                alert_type:
                  type: "string"
                  enum:
                    - "breach_risk"
                    - "projection_created"
                    - "instrument_invalidated"
                channel:
                  type: "string"
                  enum:
                    - "slack"
                    - "email"
                    - "webhook"
                config:
                  type: "object"
                  additionalProperties: true
                webhook_url:
                  type: "string"
                  format: "uri"
                recipients:
                  type: "array"
                  items:
                    type: "string"
                thresholds:
                  type: "object"
                  properties:
                    coverage_ratio_below:
                      type: "number"
                    shortfall_above:
                      type: "number"
                is_active:
                  type: "boolean"
              required:
                - "action"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/configure-risk-policy:
    post:
      operationId: "configure-risk-policy"
      summary: "Configure Risk Policy"
      tags:
        - "Risk"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                action:
                  type: "string"
                  enum:
                    - "create"
                    - "list"
                    - "delete"
                policy_type:
                  type: "string"
                  enum:
                    - "require_instrument"
                    - "budget_cap"
                    - "projection_guard"
                config:
                  type: "object"
                  additionalProperties: true
                severity:
                  type: "string"
                  enum:
                    - "hard"
                    - "soft"
                priority:
                  type: "integer"
                policy_id:
                  type: "string"
                  format: "uuid"
              required:
                - "action"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/delete-creator:
    post:
      operationId: "delete-creator"
      summary: "Soft-delete a creator (sets is_active = false with transaction guard)"
      tags:
        - "Creators"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              properties:
                creator_id:
                  type: "string"
              required:
                - "creator_id"
      responses:
        "200":
          description: "Success"
          headers: *a1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope"
